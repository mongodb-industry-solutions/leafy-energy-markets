---
kind: pipeline
type: kubernetes
name: leafy-energy-markets-staging

trigger:
  branch:
    - staging
  event:
    - push

steps:
  # ── Build & push backend via Kaniko (IRSA provides ECR credentials) ───────────
  - name: build-backend
    image: plugins/kaniko-ecr
    settings:
      region: us-east-1
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/leafy-energy-markets-backend
      tags:
        - staging
        - staging-${DRONE_COMMIT_SHA:0:7}
      dockerfile: backend/Dockerfile
      context: backend

  # ── Build & push frontend via Kaniko ─────────────────────────────────────────
  - name: build-frontend
    image: plugins/kaniko-ecr
    settings:
      region: us-east-1
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/leafy-energy-markets-frontend
      tags:
        - staging
        - staging-${DRONE_COMMIT_SHA:0:7}
      dockerfile: frontend/Dockerfile
      context: frontend
      build_args:
        # Real API URL injected at runtime via next.config.js proxy — not baked in at build time
        - NEXT_PUBLIC_API_URL=/api

  # ── Deploy backend pod ────────────────────────────────────────────────────────
  - name: deploy-backend-staging
    image: kanopy/drone-kanopy:latest
    settings:
      kubernetes_token:
        from_secret: staging_kubernetes_token
      kubernetes_server: https://api.staging.corp.mongodb.com
      namespace: industrysolutions
      app_name: leafy-energy-markets-backend
      image: 795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/leafy-energy-markets-backend:staging-${DRONE_COMMIT_SHA:0:7}
      values_file: environment/staging-backend.yaml
    depends_on:
      - build-backend

  # ── Deploy frontend pod ───────────────────────────────────────────────────────
  - name: deploy-frontend-staging
    image: kanopy/drone-kanopy:latest
    settings:
      kubernetes_token:
        from_secret: staging_kubernetes_token
      kubernetes_server: https://api.staging.corp.mongodb.com
      namespace: industrysolutions
      app_name: leafy-energy-markets-frontend
      image: 795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/leafy-energy-markets-frontend:staging-${DRONE_COMMIT_SHA:0:7}
      values_file: environment/staging-frontend.yaml
    depends_on:
      - build-frontend

---
kind: pipeline
type: kubernetes
name: leafy-energy-markets-production

trigger:
  branch:
    - main
  event:
    - push

steps:
  - name: build-backend
    image: plugins/kaniko-ecr
    settings:
      region: us-east-1
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/leafy-energy-markets-backend
      tags:
        - latest
        - ${DRONE_COMMIT_SHA:0:7}
      dockerfile: backend/Dockerfile
      context: backend

  - name: build-frontend
    image: plugins/kaniko-ecr
    settings:
      region: us-east-1
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/leafy-energy-markets-frontend
      tags:
        - latest
        - ${DRONE_COMMIT_SHA:0:7}
      dockerfile: frontend/Dockerfile
      context: frontend
      build_args:
        - NEXT_PUBLIC_API_URL=/api

  - name: deploy-backend-production
    image: kanopy/drone-kanopy:latest
    settings:
      kubernetes_token:
        from_secret: prod_kubernetes_token
      kubernetes_server: https://api.prod.corp.mongodb.com
      namespace: industrysolutions
      app_name: leafy-energy-markets-backend
      image: 795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/leafy-energy-markets-backend:${DRONE_COMMIT_SHA:0:7}
      values_file: environment/production-backend.yaml
    depends_on:
      - build-backend

  - name: deploy-frontend-production
    image: kanopy/drone-kanopy:latest
    settings:
      kubernetes_token:
        from_secret: prod_kubernetes_token
      kubernetes_server: https://api.prod.corp.mongodb.com
      namespace: industrysolutions
      app_name: leafy-energy-markets-frontend
      image: 795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/leafy-energy-markets-frontend:${DRONE_COMMIT_SHA:0:7}
      values_file: environment/production-frontend.yaml
    depends_on:
      - build-frontend
