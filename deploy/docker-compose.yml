# DEPRECATED — use the root docker-compose.yml instead:
#   cd .. && docker compose up --build
#
# This file is kept for backwards compatibility.

services:
  backend:
    build:
      context: ../backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:8080
    ports:
      - "8080:8080"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
      - PORT=8080
    depends_on:
      backend:
        condition: service_healthy
